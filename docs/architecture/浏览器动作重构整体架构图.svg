<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1160" viewBox="0 0 1800 1160" role="img" aria-labelledby="title desc">
  <title id="title">浏览器动作重构整体架构图</title>
  <desc id="desc">展示 chrome_mcp_server 重构后的分层架构、数据流、当前阶段和下一步验收重点。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff" />
      <stop offset="100%" stop-color="#eef4f8" />
    </linearGradient>
    <linearGradient id="titleBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f4c81" />
      <stop offset="100%" stop-color="#1e6aa8" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4a6278" />
    </marker>
    <style>
      .bg { fill: url(#bg); }
      .panel { fill: #ffffff; stroke: #d6e3ee; stroke-width: 2; }
      .panel-soft { fill: #f8fbfd; stroke: #d6e3ee; stroke-width: 2; }
      .layer { fill: #ffffff; stroke: #8fb4d6; stroke-width: 2.2; rx: 18; ry: 18; }
      .layer-main { fill: #fefefe; }
      .layer-support { fill: #f7fafc; stroke: #90a7bb; }
      .specialist { fill: #fff6eb; stroke: #e7a861; stroke-width: 2.2; rx: 18; ry: 18; }
      .stage { fill: #eef8f1; stroke: #6cb27c; stroke-width: 2.2; rx: 18; ry: 18; }
      .titlebar { fill: url(#titleBar); }
      .title { font: 700 34px 'Microsoft YaHei', 'Segoe UI', sans-serif; fill: #ffffff; }
      .subtitle { font: 500 16px 'Microsoft YaHei', 'Segoe UI', sans-serif; fill: #d9ebfa; }
      .box-title { font: 700 22px 'Microsoft YaHei', 'Segoe UI', sans-serif; fill: #18344d; }
      .box-sub { font: 500 14px 'Microsoft YaHei', 'Segoe UI', sans-serif; fill: #4b647a; }
      .box-sub-strong { font: 700 14px 'Microsoft YaHei', 'Segoe UI', sans-serif; fill: #4b647a; }
      .tag { font: 700 13px 'Microsoft YaHei', 'Segoe UI', sans-serif; fill: #1f5f99; }
      .flow-label { font: 600 15px 'Microsoft YaHei', 'Segoe UI', sans-serif; fill: #4a6278; }
      .section-title { font: 700 20px 'Microsoft YaHei', 'Segoe UI', sans-serif; fill: #16334c; }
      .note { font: 500 15px 'Microsoft YaHei', 'Segoe UI', sans-serif; fill: #41596f; }
      .small { font: 500 13px 'Microsoft YaHei', 'Segoe UI', sans-serif; fill: #607789; }
      .line { stroke: #4a6278; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .line-soft { stroke: #6c879c; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 7 7; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1160" rx="28" ry="28" />
  <rect class="titlebar" x="30" y="28" width="1740" height="94" rx="22" ry="22" />
  <text class="title" x="66" y="72">chrome_mcp_server 重构后的整体架构图</text>
  <text class="subtitle" x="66" y="101">共享底座：统一状态快照；主线：页面发现 -> 目标绑定 -> 动作执行 -> 结果观察 -> 结果判定；当前重点：真实站点总回归</text>

  <rect class="panel" x="30" y="146" width="1740" height="548" rx="24" ry="24" />
  <text class="section-title" x="56" y="182">1. 主链分层</text>

  <rect class="layer layer-main" x="52" y="226" width="208" height="122" />
  <text class="box-title" x="86" y="266">MCP 工具入口层</text>
  <text class="box-sub" x="74" y="297">register-*-tools.ts</text>
  <text class="tag" x="74" y="326">职责</text>
  <text class="box-sub" x="74" y="346">只做参数校验和结果包装</text>

  <rect class="layer layer-main" x="290" y="226" width="208" height="122" />
  <text class="box-title" x="332" y="266">用例编排层</text>
  <text class="box-sub" x="306" y="297">click / type / submit / result / media</text>
  <text class="tag" x="312" y="326">职责</text>
  <text class="box-sub" x="312" y="346">负责调用顺序，不再判定成败</text>

  <rect class="layer layer-main" x="528" y="226" width="208" height="122" />
  <text class="box-title" x="570" y="266">页面发现层</text>
  <text class="box-sub" x="542" y="297">semantic discovery</text>
  <text class="tag" x="550" y="326">输出</text>
  <text class="box-sub" x="550" y="346">语义候选 ElementCandidate[]</text>

  <rect class="layer layer-main" x="766" y="226" width="208" height="122" />
  <text class="box-title" x="808" y="266">目标绑定层</text>
  <text class="box-sub" x="778" y="297">runtimeNodeKey / fingerprint</text>
  <text class="tag" x="788" y="326">输出</text>
  <text class="box-sub" x="788" y="346">BoundTarget / bindingId</text>

  <rect class="layer layer-main" x="1004" y="226" width="208" height="122" />
  <text class="box-title" x="1046" y="266">动作执行层</text>
  <text class="box-sub" x="1033" y="297">preflight / hit-test</text>
  <text class="tag" x="1026" y="326">输出</text>
  <text class="box-sub" x="1026" y="346">ActionAttempt</text>

  <rect class="layer layer-main" x="1242" y="226" width="208" height="122" />
  <text class="box-title" x="1284" y="266">结果观察层</text>
  <text class="box-sub" x="1259" y="297">page / target / session events</text>
  <text class="tag" x="1264" y="326">输出</text>
  <text class="box-sub" x="1264" y="346">OutcomeEvidence</text>

  <rect class="layer layer-main" x="1480" y="226" width="250" height="122" />
  <text class="box-title" x="1533" y="266">结果判定层</text>
  <text class="box-sub" x="1520" y="297">decision / failure reasons</text>
  <text class="tag" x="1512" y="326">输出</text>
  <text class="box-sub" x="1512" y="346">ActionDecision / retryable</text>

  <path class="line" d="M260 287 L290 287" />
  <path class="line" d="M498 287 L528 287" />
  <path class="line" d="M736 287 L766 287" />
  <path class="line" d="M974 287 L1004 287" />
  <path class="line" d="M1212 287 L1242 287" />
  <path class="line" d="M1450 287 L1480 287" />

  <text class="flow-label" x="549" y="214">语义候选</text>
  <text class="flow-label" x="788" y="214">已绑定目标</text>
  <text class="flow-label" x="1030" y="214">动作尝试</text>
  <text class="flow-label" x="1266" y="214">变化证据</text>
  <text class="flow-label" x="1514" y="214">最终结论</text>

  <rect class="layer layer-support" x="332" y="396" width="988" height="104" />
  <text class="box-title" x="366" y="436">统一状态快照基础层</text>
  <text class="box-sub" x="366" y="466">DOM / DOM snapshot / AX / styles / geometry / click signals</text>
  <text class="box-sub" x="366" y="490">为 discovery、binding、observation 提供单一事实源</text>

  <rect class="layer layer-support" x="332" y="524" width="988" height="76" />
  <text class="box-title" x="366" y="568">会话与运行时层</text>
  <text class="box-sub" x="366" y="590">session / target / page / logs / config / cache</text>

  <rect class="specialist" x="1364" y="410" width="366" height="232" />
  <text class="box-title" x="1398" y="452">专项识别能力</text>
  <text class="box-sub" x="1398" y="486">overlay detector</text>
  <text class="box-sub" x="1398" y="516">verification / auth detector</text>
  <text class="box-sub" x="1398" y="546">result / media inspectors</text>
  <text class="tag" x="1398" y="580">原则</text>
  <text class="box-sub" x="1398" y="602">只提供信号和专项识别</text>
  <text class="box-sub" x="1398" y="624">不再作为动作主链的总开关</text>

  <rect class="layer-support" x="544" y="620" width="570" height="58" rx="16" ry="16" />
  <text class="box-title" x="572" y="658">浏览器内核：Puppeteer / Chrome / CDP</text>

  <path class="line-soft" d="M632 348 L632 396" />
  <path class="line-soft" d="M870 348 L870 396" />
  <path class="line-soft" d="M1108 348 L1108 396" />
  <path class="line-soft" d="M1346 348 L1346 396" />
  <path class="line-soft dashed" d="M1319 482 L1364 482" />
  <path class="line-soft dashed" d="M1319 518 L1364 518" />
  <path class="line-soft dashed" d="M1319 554 L1364 554" />
  <path class="line-soft" d="M826 500 L826 524" />
  <path class="line-soft" d="M829 600 L829 620" />

  <rect class="panel-soft" x="30" y="724" width="1740" height="188" rx="24" ry="24" />
  <text class="section-title" x="56" y="760">2. 一次动作的标准流转</text>

  <rect class="layer layer-main" x="74" y="792" width="256" height="84" />
  <text class="box-title" x="90" y="827">先取统一状态快照</text>
  <text class="box-sub" x="104" y="852">DOM / AX / styles / events</text>

  <rect class="layer layer-main" x="390" y="792" width="256" height="84" />
  <text class="box-title" x="420" y="827">再发现并绑定目标</text>
  <text class="box-sub" x="416" y="852">runtimeNodeKey / fingerprint / anchors</text>

  <rect class="layer layer-main" x="706" y="792" width="256" height="84" />
  <text class="box-title" x="736" y="827">再执行动作</text>
  <text class="box-sub" x="716" y="852">preflight + semantic click + safe fallback</text>

  <rect class="layer layer-main" x="1022" y="792" width="256" height="84" />
  <text class="box-title" x="1052" y="827">再观察证据</text>
  <text class="box-sub" x="1038" y="852">page / target / session / popup / signals</text>

  <rect class="layer layer-main" x="1338" y="792" width="356" height="84" />
  <text class="box-title" x="1368" y="827">最后统一判定</text>
  <text class="box-sub" x="1368" y="852">success / wrong_target / stale_binding / blocked</text>

  <path class="line" d="M330 834 L390 834" />
  <path class="line" d="M646 834 L706 834" />
  <path class="line" d="M962 834 L1022 834" />
  <path class="line" d="M1278 834 L1338 834" />

  <rect class="panel-soft" x="30" y="936" width="1740" height="194" rx="24" ry="24" />
  <text class="section-title" x="56" y="972">3. 当前阶段与下一步</text>

  <rect class="stage" x="74" y="1006" width="380" height="88" />
  <text class="box-title" x="104" y="1044">阶段 0-1：状态与绑定已落地</text>
  <text class="box-sub" x="104" y="1070">state/* / session/* / binding/*</text>

  <rect class="stage" x="494" y="1006" width="380" height="88" />
  <text class="box-title" x="524" y="1044">阶段 2：执行器已落地</text>
  <text class="box-sub" x="524" y="1070">execution/* / interaction-usecases.ts</text>

  <rect class="stage" x="914" y="1006" width="380" height="88" />
  <text class="box-title" x="944" y="1044">阶段 3：观察与判定已落地</text>
  <text class="box-sub" x="944" y="1070">observation/* / judgement/* / action-execution-usecases.ts</text>

  <rect class="stage" x="1334" y="1006" width="380" height="88" />
  <text class="box-title" x="1364" y="1044">阶段 4：plan 执行已闭环</text>
  <text class="box-sub" x="1364" y="1070">submit / dismiss / result / media</text>

  <path class="line" d="M454 1050 L494 1050" />
  <path class="line" d="M874 1050 L914 1050" />
  <path class="line" d="M1294 1050 L1334 1050" />

  <text class="small" x="58" y="1120">当前重点：真实站点总回归；验证 target-first + stable rebind 在公开站点上的稳定性。</text>
</svg>
