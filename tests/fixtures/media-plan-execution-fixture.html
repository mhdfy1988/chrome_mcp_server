<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media Plan Execution Fixture</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 24px;
      }
      .player {
        width: 720px;
        margin: 0 auto;
      }
      video {
        display: block;
        width: 720px;
        height: 405px;
        background: #111;
      }
      .controls {
        display: flex;
        gap: 12px;
        margin-top: 12px;
      }
      button {
        padding: 10px 18px;
      }
      #playback-result {
        margin-top: 16px;
        color: #0a7d28;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="player video-player">
        <video preload="metadata"></video>
        <div class="controls">
          <button class="play-button" aria-label="播放">播放</button>
          <button class="pause-button" aria-label="暂停">暂停</button>
        </div>
        <div id="playback-result">MEDIA_IDLE</div>
      </section>
    </main>
    <script>
      const video = document.querySelector("video");
      const playButton = document.querySelector(".play-button");
      const pauseButton = document.querySelector(".pause-button");
      const result = document.querySelector("#playback-result");

      let playing = false;
      let currentTime = 0;

      Object.defineProperty(video, "paused", {
        configurable: true,
        get() {
          return !playing;
        },
      });

      Object.defineProperty(video, "currentTime", {
        configurable: true,
        get() {
          return currentTime;
        },
        set(value) {
          currentTime = Number(value) || 0;
        },
      });

      Object.defineProperty(video, "duration", {
        configurable: true,
        get() {
          return 120;
        },
      });

      Object.defineProperty(video, "readyState", {
        configurable: true,
        get() {
          return 4;
        },
      });

      Object.defineProperty(video, "networkState", {
        configurable: true,
        get() {
          return 1;
        },
      });

      video.play = () => {
        playing = true;
        currentTime = 1.25;
        result.textContent = "MEDIA_PLAYING";
        return Promise.resolve();
      };

      video.pause = () => {
        playing = false;
        result.textContent = "MEDIA_PAUSED";
      };

      video.addEventListener("click", () => {
        void video.play();
      });

      playButton.addEventListener("click", () => {
        void video.play();
      });

      pauseButton.addEventListener("click", () => {
        video.pause();
      });
    </script>
  </body>
</html>
