<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Submit Attempt Fixture</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f6fb;
        --panel: #ffffff;
        --ink: #1f1a16;
        --muted: #6b7280;
        --accent: #2563eb;
        --line: rgba(31, 26, 22, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 32%),
          linear-gradient(180deg, #fdfdff 0%, var(--bg) 100%);
      }

      .shell {
        width: min(880px, calc(100vw - 48px));
        margin: 0 auto;
        padding: 40px 0 72px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 20px;
        background: var(--panel);
        padding: 24px;
        box-shadow: 0 16px 36px rgba(31, 26, 22, 0.08);
      }

      label {
        display: block;
        font-size: 14px;
        color: var(--muted);
        margin-bottom: 6px;
      }

      input {
        width: 100%;
        border-radius: 12px;
        border: 1px solid var(--line);
        padding: 10px 12px;
        font-size: 14px;
      }

      button {
        margin-top: 14px;
        border: 0;
        border-radius: 999px;
        padding: 10px 18px;
        font-size: 14px;
        font-weight: 600;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
      }

      .result {
        margin-top: 16px;
        padding: 12px 14px;
        border-radius: 12px;
        background: rgba(37, 99, 235, 0.08);
        color: #1e3a8a;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <h1>提交动作夹具</h1>
        <p class="lead">
          用于验证 submit 输入框提交时的动作回执字段。
        </p>

        <form id="search-form">
          <label for="query-input">搜索内容</label>
          <input
            id="query-input"
            name="query"
            type="text"
            placeholder="输入关键词"
          />
          <button id="submit-btn" type="submit">提交</button>
        </form>

        <div class="result" id="submit-result">状态：未提交</div>
      </section>
    </main>

    <script>
      const form = document.getElementById("search-form");
      const result = document.getElementById("submit-result");
      const input = document.getElementById("query-input");

      form?.addEventListener("submit", (event) => {
        event.preventDefault();
        const value = input?.value ?? "";
        result.textContent = `状态：已提交（${value || "空值"}）`;
      });
    </script>
  </body>
</html>
