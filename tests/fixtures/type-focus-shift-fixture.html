<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Type Focus Shift Fixture</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f6fb;
        --panel: #ffffff;
        --ink: #201a16;
        --muted: #6b7280;
        --line: rgba(32, 26, 22, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 30%),
          linear-gradient(180deg, #fcfcff 0%, var(--bg) 100%);
      }

      .shell {
        width: min(860px, calc(100vw - 48px));
        margin: 0 auto;
        padding: 40px 0 72px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--panel);
        padding: 28px;
        box-shadow: 0 16px 36px rgba(32, 26, 22, 0.08);
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-top: 20px;
      }

      label {
        display: block;
        font-size: 14px;
        color: var(--muted);
        margin-bottom: 6px;
      }

      input {
        width: 100%;
        border-radius: 12px;
        border: 1px solid var(--line);
        padding: 10px 12px;
        font-size: 14px;
      }

      .result {
        margin-top: 18px;
        padding: 12px 14px;
        border-radius: 12px;
        background: rgba(37, 99, 235, 0.08);
        color: #1e3a8a;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <h1>УЙЊтЁЦтљјуёдуѓ╣Т╝ѓуД╗тц╣тЁи</h1>
        <p>
          уЏ«ТаЄУЙЊтЁЦТАєтюеТћХтѕ░УЙЊтЁЦтљјС╝џуФІтѕ╗Тііуёдуѓ╣тѕЄтѕ░СИІСИђСИфУЙЊтЁЦТАєсђѓ
          жбёТюЪтЏъТЅДт║ћС┐ЮуЋЎ `valueVerified=true`№╝їтљїТЌХСйЊуј░ `activeElementMatched=false` СИј `focusChanged=true`сђѓ
        </p>

        <div class="row">
          <div>
            <label for="primary-input">СИ╗УЙЊтЁЦТАє</label>
            <input id="primary-input" type="text" />
          </div>
          <div>
            <label for="secondary-input">тљју╗ГУЙЊтЁЦТАє</label>
            <input id="secondary-input" type="text" />
          </div>
        </div>

        <div id="type-focus-status" class="result">уіХТђЂ№╝џIDLE</div>
      </section>
    </main>

    <script>
      const primary = document.getElementById("primary-input");
      const secondary = document.getElementById("secondary-input");
      const status = document.getElementById("type-focus-status");

      primary?.addEventListener("input", () => {
        if (primary.value !== "focus-shift") {
          status.textContent = `уіХТђЂ№╝џTYPING_${primary.value.length}`;
          return;
        }

        queueMicrotask(() => {
          secondary?.focus();
          status.textContent = "уіХТђЂ№╝џFOCUS_SHIFTED";
        });
      });
    </script>
  </body>
</html>
