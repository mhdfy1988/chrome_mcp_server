<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>Container Primary Action Fixture</title>
  </head>
  <body>
    <table>
      <tbody>
        <tr id="folder-row-authors">
          <td id="file-cell">
            <div class="react-directory-filename-column">
              <div class="react-directory-filename-cell">
                <a
                  id="authors-link"
                  title="authors.yaml"
                  aria-label="authors.yaml, (File)"
                  class="Link--primary"
                  href="./container-primary-action-file-target.html"
                >
                  authors.yaml
                </a>
              </div>
            </div>
          </td>
          <td id="message-cell">
            <a
              id="commit-link"
              title="Update docs"
              aria-label="Update docs, (Commit)"
              href="./container-primary-action-aux-target.html#commit"
            >
              Update docs
            </a>
          </td>
          <td id="history-cell">
            <a
              id="history-link"
              title="History"
              aria-label="History, (Link)"
              href="./container-primary-action-aux-target.html#history"
            >
              History
            </a>
          </td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
