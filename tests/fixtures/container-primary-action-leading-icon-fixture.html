<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>Container Primary Action Leading Icon Fixture</title>
  </head>
  <body>
    <table>
      <tbody>
        <tr id="folder-row-authors-leading-icon">
          <td id="icon-cell" aria-hidden="true">
            <span class="status-dot">●</span>
          </td>
          <td id="file-cell">
            <div class="react-directory-filename-column">
              <div class="overflow-hidden">
                <div class="react-directory-filename-cell">
                  <div class="react-directory-truncate">
                    <a
                      id="authors-link-leading-icon"
                      title="authors.yaml"
                      aria-label="authors.yaml, (File)"
                      class="Link--primary"
                      href="./container-primary-action-file-target.html"
                    >
                      authors.yaml
                    </a>
                  </div>
                </div>
              </div>
            </div>
          </td>
          <td id="message-cell">
            <a
              id="commit-link-leading-icon"
              title="Update docs"
              aria-label="Update docs, (Commit)"
              href="./container-primary-action-aux-target.html#commit"
            >
              Update docs
            </a>
          </td>
          <td id="history-cell">
            <a
              id="history-link-leading-icon"
              title="History"
              aria-label="History, (Link)"
              href="./container-primary-action-aux-target.html#history"
            >
              History
            </a>
          </td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
