        function updateserver(pid, hostip, typeid) {
            var serverversion = 0;
            var serverversionname = "未知版本";
            var newversion = 0;
            var newversionname = "未知版本";
            var iptag = $("#iptag").val();
            var datar = "";
            //获取版本
            $.ajax({
                type: "post",
                url: "/ServiceMonitoringManagementController/getserverversion?pid=" + pid + "&type=" + typeid + "&hostip=" + hostip + "&iptag=" + iptag,
                dataType: "text",
                timeout: 5000,
                async: false,
                success: function (data) {
                    datar = data;
                    var tmp1 = data.split(",");
                    if (tmp1.length > 1) {
                        var tmp2 = tmp1[0].split("\|");
                        serverversion = parseInt(tmp2[0]);
                        serverversionname = tmp2[1];

                        var tmp3 = tmp1[1].split("\|");
                        newversion = parseInt(tmp3[0]);
                        newversionname = tmp3[1];
                    }
                }
            });
            if (serverversion < newversion) {
                var contentstr = "是否将[" + serverversionname + "]，<br/>替换为[" + newversionname + "]？<br/>点击【替换】按钮开始更新！";
                var dblChoseAlert = simpleAlert_g({
                    "title": "更新服务",
                    "content": contentstr,
                    "buttons": {
                        "替换": function () {
                            $.ajax({
                                type: "post",
                                url: "/ServiceMonitoringManagementController/updateserverver?pid=" + pid + "&type=" + typeid + "&hostip=" + hostip + "&iptag=" + iptag,
                                dataType: "text",
                                success: function (data) {
                                    alert(data);
                                }
                            });
                            dblChoseAlert.close();
                        },
                        "取消": function () {
                            dblChoseAlert.close();
                        }
                    }
                });
            } else if (serverversion == newversion) {
                var contentstr = "已是最新[" + serverversionname + "]！";
                var dblChoseAlert = simpleAlert_g({
                    "title": "更新服务",
                    "content": contentstr,
                    "buttons": {
                        "关闭": function () {
                            dblChoseAlert.close();
                        }
                    }
                });
            } else {
                var contentstr = "是否将[" + serverversionname + "]，<br/>强制替换为[" + newversionname + "]？<br/>点击【强制替换】按钮开始替换！";
                var dblChoseAlert = simpleAlert({
                    "title": "强制更新",
                    "content": contentstr,
                    "buttons": {
                        "强制替换": function () {
                            var dblChoseAlert2 = simpleAlert({
                                "title": "强制更新",
                                "content": "是否强制替换为【" + newversionname + "】?",
                                "buttons": {
                                    "强制替换": function () {
                                        $.ajax({
                                            type: "post",
                                            url: "/ServiceMonitoringManagementController/updateserverver?pid=" + pid + "&type=" + typeid + "&hostip=" + hostip + "&iptag=" + iptag,
                                            dataType: "text",
                                            success: function (data) {
                                                alert(data);
                                            }
                                        });
                                        dblChoseAlert2.close();
                                        dblChoseAlert.close();
                                    },
                                    "取消": function () {
                                        dblChoseAlert2.close();
                                        dblChoseAlert.close();
                                    }
                                }
                            });
                            // dblChoseAlert.close();
                        },
                        "取消": function () {
                            dblChoseAlert.close();
                        }
                    }
                });
            }
        }

        function updateairobotgo(hostip) {
            var serverversion = 0;
            var serverversionname = "";
            var newversion = 0;
            var newversionname = "";
            //获取服务器版本
            $.ajax({
                type: "post",
                url: "/ServiceMonitoringManagementController/getserverairobotversion?hostip=" + hostip,
                dataType: "text",
                async: false,
                success: function (data) {
                    var tmp = data.split("\|");
                    if (tmp.length > 1) {
                        serverversion = parseInt(tmp[1]);
                        serverversionname = tmp[0];
                    }
                }
            });
            //获取最新版本
            $.ajax({
                type: "post",
                url: "/ServiceMonitoringManagementController/getnewairobotversion",
                dataType: "text",
                async: false,
                success: function (data) {
                    var tmp = data.split("\|");
                    if (tmp.length > 1) {
                        newversion = parseInt(tmp[1]);
                        newversionname = tmp[0];
                    }
                }
            });
            if (serverversion < newversion) {
                var dblChoseAlert = simpleAlert({
                    "title": "更新AI机器人",
                    "content": "服务器版本为<" + serverversionname + ">，最新版本为<" + newversionname + ">,点击【更新】按钮开始更新！",
                    "buttons": {
                        "更新": function () {
                            $.ajax({
                                type: "post",
                                url: "/ServiceMonitoringManagementController/updateairobotgo?hostip=" + hostip,
                                dataType: "text",
                                success: function (data) {
                                    alert(data);
                                }
                            });
                            dblChoseAlert.close();
                        },
                        "取消": function () {
                            dblChoseAlert.close();
                        }
                    }
                });
            } else if (serverversion >= newversion) {
                var dblChoseAlert = simpleAlert({
                    "title": "更新AI机器人",
                    "content": "服务器版本已是最新<" + serverversionname + ">！",
                    "buttons": {
                        "关闭": function () {
                            dblChoseAlert.close();
                        }
                    }
                });
            }
        }

            $(".nice-select").click(function (e) {

                e.stopPropagation();
            });

            $('#list').delegate('li', 'mouseover mouseout', function (e) {
                $(this).toggleClass("on");
                e.stopPropagation();
            });

            $('#list').delegate('li', 'click', function (e) {
                var val = $(this).text();
                var showContent = $('input[name="showContent"]:checked').val();
                if (showContent == "portion") {
                    if (val.indexOf('--') != -1)
                        val = val.substring(0, val.indexOf('--'));
                }
                $(".nice-select").find("input").val(val);
                $(".nice-select").find("ul").hide();
                e.stopPropagation();
            });

            $(document).click(function () {
                $(".nice-select").find("ul").hide();
            });

            selectset();
        }

        function searchList(strValue) {
            var count = 0;
            if (strValue != "") {
                $(".nice-select ul li").each(function (i) {
                    var contentValue = $(this).text();
                    if (contentValue.toLowerCase().indexOf(strValue.toLowerCase()) < 0) {
                        $(this).hide();
                        count++;
                    } else {
                        $(this).show();
                    }
                    if (count == (i + 1)) {
                        $(".nice-select").find("ul").hide();
                    } else {
                        $(".nice-select").find("ul").show();
                    }
                });
            } else {
                $(".nice-select ul li").each(function (i) {
                    $(this).show();
                });
            }
        }

        function stepinit() {
            $("#process2").addClass('main-hide');
            $("#process3").addClass('main-hide');
            $('#previous_step').hide();
            /*上一步*/
            $('#previous_step').bind('click', function () {
                index--;
                ControlContent(index);
            });
            /*下一步*/
            $('#next_step').bind('click', function () {
                if (index == 0) {
                    if (!checkpage1()) {
                        return false;
                    }
                    getconfig($("#serviceid").val());
                }
                index++;
                ControlContent(index);
            });
        }

        function ControlContent(index) {
            var stepContents = ["process1", "process2", "process3"];
            var key;//数组中元素的索引值
            for (key in stepContents) {
                var stepContent = stepContents[key];//获得元素的值
                if (key == index) {
                    if (stepContent == 'process1') {
                        $('#previous_step').hide();
                    } else {
                        $('#previous_step').show();
                    }
                    if (stepContent == 'process3') {
                        $('#next_step').hide();
                    } else {
                        $('#next_step').show();
                    }
                    $('#' + stepContent).removeClass('main-hide');
                    $('#point' + key).addClass('c-select');
                    $('#line' + key).removeClass('b-select');
                } else {
                    $('#' + stepContent).addClass('main-hide');
                    if (key > index) {
                        $('#point' + key).removeClass('c-select');
                        $('#line' + key).removeClass('b-select');
                    } else if (key < index) {
                        $('#point' + key).addClass('c-select');
                        $('#line' + key).addClass('b-select');
                    }
                }
            }
        }

                var i = options.gid + "_" + options.rowId;
                alertmap.set(i, cellvalue);

            }
            return cellvalue;
        }

    function subleveltab(tabid, url, name) {
        var selecttab = $('#' + tabid).tabs('getTab', name);
        if (selecttab != null) {
            $('#' + tabid).tabs('select', name);
            return;
        }
        $('#' + tabid).tabs('add', {
            title: name,
            content: '<iframe id="' + tabid + '-iframe" src="' + url + '" width="100%" height="580px" security="restricted" sandbox="allow-same-origin allow-scripts" ></iframe>',
            closable: true,
            tools: [{
                iconCls: 'icon-mini-refresh',
                handler: function () {
                    //选中当前tab页
                    $('#' + tabid).tabs('select', name);
                    //获取选中的tab页
                    var tab = $('#' + tabid).tabs('getSelected');
                    var index = $('#tt').tabs('getTabIndex', tab);
                    //刷新
                    $('#' + tabid).tabs('update', {
                        tab: tab,
                        options: {
                            title: name,
                            content: '<iframe id="' + tabid + '-iframe" src="' + url + '" width="100%" height="500px" security="restricted" sandbox="allow-same-origin allow-scripts" ></iframe>'
                        }
                    });
                }
            }]
        });
    }
